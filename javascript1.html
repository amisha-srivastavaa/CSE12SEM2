<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Example</title>
    </head>
    <body>
        <h1>JavaScript variables</h1>
        <p id="demo">Hello, World!</p>
       

        <script>
            let a=10;
            let b=20;
            let sum=a+b;
            document.getElementById("demo").innerHTML="The sum of a and b is: " + sum;      


        </script>
    </body>


</html>
